<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background, matches app theme color -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0D1117"/>

  <!-- Subtle inner border, half-opacity matching the app border token -->
  <rect x="6" y="6" width="500" height="500" rx="90" ry="90"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- X glyph in game-x blue, positioned slightly up-left -->
  <text x="172" y="312"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-weight="800"
        font-size="280"
        fill="#5EA4F5"
        text-anchor="middle"
        dominant-baseline="alphabetic">X</text>

  <!-- o glyph in game-o orange, lower-right, smaller (matching lowercase o in wordmark) -->
  <text x="356" y="362"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-weight="800"
        font-size="220"
        fill="#F59E5B"
        text-anchor="middle"
        dominant-baseline="alphabetic">o</text>
</svg>
